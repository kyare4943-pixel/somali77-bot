openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Discord Bot Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: voice
    description: Voice channel management
  - name: invites
    description: Invite tracker
  - name: webhooks
    description: Webhook management
  - name: embeds
    description: Embed builder
  - name: settings
    description: Bot settings
  - name: game
    description: Hacker Wars game

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated

  /voice/config:
    get:
      operationId: getVoiceConfig
      tags: [voice]
      summary: Get voice channel config
      responses:
        "200":
          description: Voice config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceConfig"
    patch:
      operationId: updateVoiceConfig
      tags: [voice]
      summary: Update voice channel config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceConfigInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceConfig"

  /voice/channels:
    get:
      operationId: getActiveVoiceChannels
      tags: [voice]
      summary: Get active temporary voice channels
      responses:
        "200":
          description: Active channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveChannel"

  /invites:
    get:
      operationId: getInvites
      tags: [invites]
      summary: Get invite leaderboard
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InviteRecord"

  /invites/stats:
    get:
      operationId: getInviteStats
      tags: [invites]
      summary: Get invite summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteStats"

  /webhooks:
    get:
      operationId: getWebhooks
      tags: [webhooks]
      summary: List saved webhooks
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Save a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /webhooks/{id}:
    get:
      operationId: getWebhook
      tags: [webhooks]
      summary: Get a webhook by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    patch:
      operationId: updateWebhook
      tags: [webhooks]
      summary: Update a webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Delete a webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /webhooks/{id}/send:
    post:
      operationId: sendWebhookMessage
      tags: [webhooks]
      summary: Send a message or embed via webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookMessage"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get bot settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

  /game/stats:
    get:
      operationId: getGameStats
      tags: [game]
      summary: Get Hacker Wars game statistics
      responses:
        "200":
          description: Game stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResponse:
      type: object
      required: [authenticated, role]
      properties:
        authenticated:
          type: boolean
        role:
          type: string

    VoiceConfig:
      type: object
      required: [enabled, categoryId, channelId, defaultName]
      properties:
        enabled:
          type: boolean
        categoryId:
          type: ["string", "null"]
        channelId:
          type: ["string", "null"]
        defaultName:
          type: string

    VoiceConfigInput:
      type: object
      properties:
        enabled:
          type: boolean
        categoryId:
          type: ["string", "null"]
        channelId:
          type: ["string", "null"]
        defaultName:
          type: string

    ActiveChannel:
      type: object
      required: [id, name, ownerId, memberCount]
      properties:
        id:
          type: string
        name:
          type: string
        ownerId:
          type: string
        memberCount:
          type: integer

    InviteRecord:
      type: object
      required: [userId, username, total, fake, left]
      properties:
        userId:
          type: string
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        total:
          type: integer
        fake:
          type: integer
        left:
          type: integer

    InviteStats:
      type: object
      required: [totalInvites, totalMembers, topInviter]
      properties:
        totalInvites:
          type: integer
        totalMembers:
          type: integer
        topInviter:
          type: ["string", "null"]

    Webhook:
      type: object
      required: [id, name, url, channelId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        channelId:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    WebhookInput:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
        url:
          type: string
        channelId:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    WebhookUpdate:
      type: object
      properties:
        name:
          type: string
        channelId:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    EmbedField:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: string
        inline:
          type: boolean

    EmbedData:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        footerText:
          type: ["string", "null"]
        authorName:
          type: ["string", "null"]
        authorIconUrl:
          type: ["string", "null"]
        timestamp:
          type: boolean
        fields:
          type: array
          items:
            $ref: "#/components/schemas/EmbedField"

    WebhookMessage:
      type: object
      properties:
        content:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        embed:
          $ref: "#/components/schemas/EmbedData"

    SendResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        messageId:
          type: ["string", "null"]

    BotSettings:
      type: object
      required: [prefix, language, logsChannelId, welcomeChannelId]
      properties:
        prefix:
          type: string
        language:
          type: string
        logsChannelId:
          type: ["string", "null"]
        welcomeChannelId:
          type: ["string", "null"]

    BotSettingsInput:
      type: object
      properties:
        prefix:
          type: string
        language:
          type: string
        logsChannelId:
          type: ["string", "null"]
        welcomeChannelId:
          type: ["string", "null"]

    GameStats:
      type: object
      required: [totalGames, hackerWins, defenderWins, activePlayers]
      properties:
        totalGames:
          type: integer
        hackerWins:
          type: integer
        defenderWins:
          type: integer
        activePlayers:
          type: integer
